<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FloatBoard</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="upgrade.css" />
  </head>
  <body>
    <div id="app" class="window-shell">
      <canvas id="snow-canvas"></canvas>

      <header class="chrome-bar" aria-label="Window controls">
        <div class="traffic-lights">
          <button id="close-btn" class="traffic-button close" type="button" aria-label="Close"></button>
          <button id="minimize-btn" class="traffic-button minimize" type="button" aria-label="Minimize"></button>
          <button id="maximize-btn" class="traffic-button maximize" type="button" aria-label="Maximize"></button>
        </div>

        <div class="window-title" aria-hidden="true">
          <span class="title-mark"></span>
          <span>FloatBoard</span>
        </div>

        <div class="window-actions">
          <div class="actions-capsule">
            <button id="pin-btn" class="icon-button pinned" type="button" aria-label="Always on top" aria-pressed="true" title="Always on top">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M14 3l7 7-3 1-4 4v5l-2 2-3.5-6.5L2 12l2-2h5l4-4 1-3z"></path>
              </svg>
            </button>
            <button id="theme-toggle-btn" class="icon-button" type="button" aria-label="Toggle theme" title="Toggle theme">
              <svg viewBox="0 0 24 24" aria-hidden="true" class="theme-icon-sun" style="display: none;">
                <circle cx="12" cy="12" r="5"></circle>
                <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"></path>
              </svg>
              <svg viewBox="0 0 24 24" aria-hidden="true" class="theme-icon-moon">
                <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
              </svg>
            </button>
            <button id="history-btn" class="icon-button" type="button" aria-label="History" title="History">
              <svg viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10"></circle>
                <polyline points="12 6 12 12 16 14"></polyline>
              </svg>
            </button>
            <button id="activate-btn" class="icon-button" type="button" aria-label="Activate Premium" title="Activate Premium">
              <svg viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"></path>
              </svg>
            </button>
            <span id="premium-badge" aria-label="Premium Activated" title="Premium Activated" style="display: none; width: 18px; height: 18px; padding: 4px; cursor: default; color: #f5a623;">
              <svg viewBox="0 0 24 24" aria-hidden="true" fill="currentColor" stroke="none">
                <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon>
              </svg>
            </span>
            <button id="settings-btn" class="icon-button" type="button" aria-label="Settings" title="Settings">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M19.14,12.94c0.04-0.3,0.06-0.61,0.06-0.94c0-0.32-0.02-0.64-0.07-0.94l2.03-1.58c0.18-0.14,0.23-0.41,0.12-0.61 l-1.92-3.32c-0.12-0.22-0.37-0.29-0.59-0.22l-2.39,0.96c-0.5-0.38-1.03-0.7-1.62-0.94L14.4,2.81c-0.04-0.24-0.24-0.41-0.48-0.41 h-3.84c-0.24,0-0.43,0.17-0.47,0.41L9.25,5.35C8.66,5.59,8.12,5.92,7.63,6.29L5.24,5.33c-0.22-0.08-0.47,0-0.59,0.22L2.74,8.87 C2.62,9.08,2.66,9.34,2.86,9.48l2.03,1.58C4.84,11.36,4.8,11.69,4.8,12s0.02,0.64,0.07,0.94l-2.03,1.58 c-0.18,0.14-0.23,0.41-0.12,0.61l1.92,3.32c0.12,0.22,0.37,0.29,0.59,0.22l2.39-0.96c0.5,0.38,1.03,0.7,1.62,0.94l0.36,2.54 c0.05,0.24,0.24,0.41,0.48,0.41h3.84c0.24,0,0.44-0.17,0.47-0.41l0.36-2.54c0.59-0.24,1.13-0.56,1.62-0.94l2.39,0.96 c0.22,0.08,0.47,0,0.59-0.22l1.92-3.32c0.12-0.22,0.07-0.47-0.12-0.61L19.14,12.94z M12,15.6c-1.98,0-3.6-1.62-3.6-3.6 s1.62-3.6,3.6-3.6s3.6,1.62,3.6,3.6S13.98,15.6,12,15.6z"></path>
              </svg>
            </button>
          </div>
        </div>
      </header>

      <main id="board" class="board" tabindex="0" aria-label="Floating clipboard board">
        <div id="sections" class="sections" data-count="0"></div>
        <div id="empty-state" class="empty-state" aria-hidden="true">
          <div class="empty-icons">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M5 4h14v16H5z"></path>
              <path d="M8 8h8M8 12h6M8 16h7"></path>
            </svg>
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M4 5h16v14H4z"></path>
              <path d="M7 15l3-3 3 3 2-2 3 3"></path>
              <circle cx="9" cy="9" r="1.5"></circle>
            </svg>
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M4 6h16v12H4z"></path>
              <path d="M10 9l5 3-5 3z"></path>
            </svg>
          </div>
          <div class="empty-title">FloatBoard - Empty</div>
        </div>
      </main>

      <div id="media-preview-popup" class="media-preview-popup" aria-hidden="true"></div>

      <!-- History Panel Overlay -->
      <div id="history-overlay" class="history-overlay" aria-hidden="true">
        <div class="history-panel">
          <div class="history-header">
            <h3>History</h3>
            <div class="history-header-actions">
              <button id="clear-history-btn" class="history-clear-btn" type="button" title="Clear all history">Clear All</button>
              <button id="history-close-btn" class="settings-close-btn" type="button" aria-label="Close history">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M6 6l12 12M18 6L6 18"></path>
                </svg>
              </button>
            </div>
          </div>
          <div id="history-list" class="history-list">
            <!-- Dynamically populated deleted items go here -->
          </div>
        </div>
      </div>
      
      <!-- Settings Panel Overlay -->
      <div id="settings-overlay" class="settings-overlay" aria-hidden="true">
        <div class="settings-panel">
          <div class="settings-header">
            <h3>Settings</h3>
            <button id="settings-close-btn" class="settings-close-btn" type="button" aria-label="Close settings">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M6 6l12 12M18 6L6 18"></path>
              </svg>
            </button>
          </div>
          <div class="settings-body">
            <div class="setting-item">
              <div class="setting-info">
                <div class="setting-title">Image Zoom Preview</div>
                <div class="setting-desc">Show a large, clear preview of images when hovered.</div>
              </div>
              <label class="switch">
                <input type="checkbox" id="zoom-toggle" checked />
                <span class="slider"></span>
              </label>
            </div>
            
            <div class="setting-item">
              <div class="setting-info">
                <div class="setting-title" style="display: flex; align-items: center; gap: 6px;">
                  <svg viewBox="0 0 24 24" style="width: 14px; height: 14px; fill: none; stroke: currentColor; stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round;" aria-hidden="true">
                    <line x1="12" y1="2" x2="12" y2="22"></line>
                    <line x1="17" y1="5" x2="7" y2="19"></line>
                    <line x1="19" y1="12" x2="5" y2="12"></line>
                    <line x1="17" y1="19" x2="7" y2="5"></line>
                    <path d="M12 2l2 2M12 22l-2-2M2 12l2 2M22 12l-2-2M17 5l1.5-0.5M7 19l-1.5 0.5M19 12l-0.5 1.5M5 12l0.5-1.5"></path>
                  </svg>
                  <span>Snowfall Effect</span>
                </div>
                <div class="setting-desc">Enable a gentle snowfall animation inside the window.</div>
              </div>
              <label class="switch">
                <input type="checkbox" id="snow-toggle" />
                <span class="slider"></span>
              </label>
            </div>
          </div>
        </div>
      </div>

      <!-- License Panel Overlay -->
      <div id="license-overlay" class="settings-overlay" aria-hidden="true">
        <div class="settings-panel">
          <div class="settings-header">
            <h3>Activate Premium</h3>
            <button id="license-close-btn" class="settings-close-btn" type="button" aria-label="Close">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M6 6l12 12M18 6L6 18"></path>
              </svg>
            </button>
          </div>
          <div class="settings-body" style="padding: 24px; text-align: center;">
            <p style="margin-bottom: 16px; font-size: 0.95rem; opacity: 0.8;">Enter your email and the License Key you received after purchase.</p>
            <input type="email" id="activation-email" placeholder="Your email address" style="width: 100%; padding: 12px; border-radius: 6px; border: 1px solid rgba(128,128,128,0.3); background: transparent; color: inherit; margin-bottom: 12px; font-family: monospace; font-size: 14px;" />
            <input type="text" id="license-input" placeholder="FL-XXXXXXXXXXXXXXXX" style="width: 100%; padding: 12px; border-radius: 6px; border: 1px solid rgba(128,128,128,0.3); background: transparent; color: inherit; margin-bottom: 16px; font-family: monospace; font-size: 14px;" />
            <div id="license-error" style="color: #ff4d4f; font-size: 12.5px; margin-top: -8px; margin-bottom: 12px; display: none; text-align: left; font-weight: 500;">Invalid License Key</div>
            <button id="license-submit-btn" style="width: 100%; padding: 12px; border-radius: 6px; background: #00adef; color: white; border: none; font-weight: 600; cursor: pointer; margin-bottom: 12px;">Activate</button>
            <button id="buy-license-btn" type="button" style="width: 100%; padding: 12px; border-radius: 6px; background: transparent; border: 1px solid rgba(128,128,128,0.3); color: inherit; text-decoration: none; font-weight: 500; cursor: pointer;">Buy License</button>
          </div>
        </div>
      </div>

      <div id="toast" class="toast" role="status" aria-live="polite"></div>
      <div id="resize-grip" class="resize-grip" aria-hidden="true"></div>
    </div>

    <script src="renderer.js"></script>
  </body>
</html>
