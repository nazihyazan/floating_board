name: Build Cross-Platform App

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install

      - name: Build Windows Store App (AppX) & Exe
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          npm run build:win
          npx electron-builder --win appx -c.directories.output=dist/windows

      - name: Build macOS App
        if: matrix.os == 'macos-latest'
        run: npm run build:mac

      - name: Build Linux App (Deb, RPM, AppImage)
        if: matrix.os == 'ubuntu-latest'
        run: npm run build:linux

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: floatboard-${{ matrix.os }}
          path: |
            dist/windows/*.exe
            dist/windows/*.appx
            dist/macos/*.zip
            dist/macos/*.dmg
            dist/linux/*.deb
            dist/linux/*.rpm
            dist/linux/*.AppImage
          retention-days: 7
